services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: dw
      POSTGRES_USER: dw_user
      POSTGRES_PASSWORD: dw_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dw_user -d dw"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  etl:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://dw_user:dw_pass@postgres:5432/dw
      POSTGRES_HOST: postgres
      POSTGRES_DB: dw
      POSTGRES_USER: dw_user
      POSTGRES_PASSWORD: dw_pass
    volumes:
      - ./data-lake:/data-lake
    depends_on:
      postgres:
        condition: service_healthy
